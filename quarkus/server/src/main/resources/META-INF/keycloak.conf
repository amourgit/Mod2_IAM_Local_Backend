# =============================================================================
# IAM Local UOB — Configuration Keycloak Production
# Version : 0.0.0 (basée sur Keycloak 26.6.0)
#
# Ce fichier configure le serveur en mode production.
# Il est embarqué dans le build Quarkus optimisé.
# Les valeurs sensibles (mots de passe) sont surchargées par variables d'env.
# =============================================================================

# ── Base de données ────────────────────────────────────────────────────────────
db=postgres
db-url-host=localhost
db-url-port=5432
db-url-database=keycloak_iam_local
db-username=keycloak
# db-password= surchargé par KC_DB_PASSWORD en production

# Pool de connexions
db-pool-min-size=5
db-pool-max-size=20
db-pool-initial-size=5

# ── Serveur HTTP ───────────────────────────────────────────────────────────────
http-enabled=true
http-port=8080

# En production réelle : mettre https-port=8443 et configurer le keystore
# https-port=8443
# https-key-store-file=conf/server.keystore
# https-key-store-password=changeme

# ── Hostname ───────────────────────────────────────────────────────────────────
# Pour dev/local : on désactive la validation stricte du hostname
hostname=localhost
hostname-strict=false
hostname-strict-https=false

# En production réelle : mettre le vrai domaine
# hostname=iam.uob.ga
# hostname-strict=true

# ── Proxy ─────────────────────────────────────────────────────────────────────
# Si derrière un reverse proxy (Nginx, Apache, Traefik)
# proxy-headers=xforwarded

# ── Bootstrap Admin ────────────────────────────────────────────────────────────
# NE PAS définir bootstrap-admin-username et bootstrap-admin-password ici.
# Sans ces valeurs, Keycloak affiche la page de création d'admin dans le navigateur
# au premier démarrage quand aucun admin n'existe encore.
# Une fois l'admin créé via le navigateur, cette page disparaît définitivement.

# ── Fonctionnalités ────────────────────────────────────────────────────────────
features=token-exchange,admin-fine-grained-authz

# ── Health & Metrics ───────────────────────────────────────────────────────────
health-enabled=true
metrics-enabled=true

# ── Logging ────────────────────────────────────────────────────────────────────
log=console
log-level=INFO
log-console-color=true
log-console-format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%e%n

# Niveaux spécifiques pour le debug IAM Local
log-level=INFO,ga.uob.iam:DEBUG

# ── Cache (mode single node pour dev/prod local) ────────────────────────────────
# Pour un cluster multi-nœuds : cache=ispn avec cache-stack=kubernetes ou tcp
cache=local

# ── Transactions ───────────────────────────────────────────────────────────────
transaction-xa-enabled=false
